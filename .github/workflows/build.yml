name: Build and Push Runtime Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/gamecp/runtimes

jobs:
  wine-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wine-base
        uses: docker/build-push-action@v5
        with:
          context: ./wine-base
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:wine-base
            ${{ env.IMAGE_PREFIX }}:wine-base-${{ github.sha }}

  wine-vcrun:
    runs-on: ubuntu-latest
    needs: wine-base
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wine-vcrun
        uses: docker/build-push-action@v5
        with:
          context: ./wine-vcrun
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_PREFIX }}:wine-vcrun
            ${{ env.IMAGE_PREFIX }}:wine-vcrun-${{ github.sha }}
